services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailer} -d ${POSTGRES_DB:-retailer_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: erp-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-erp_db}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:80}
      MOBILE_POC_ENABLED: ${MOBILE_POC_ENABLED:-false}
      MOBILE_POC_SECRET: ${MOBILE_POC_SECRET:-}
      MOBILE_POC_USERNAME: ${MOBILE_POC_USERNAME:-admin}
      MOBILE_POC_TOKEN_TTL_DAYS: ${MOBILE_POC_TOKEN_TTL_DAYS:-30}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: erp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # Marketing/Landing Website (optional)
  # To run: docker-compose --profile website up
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: appsire-website
    ports:
      - "3000:80"
    profiles:
      - website
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
